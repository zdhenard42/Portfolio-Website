    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>QR Code Reader</title>
    <meta name="description" content="Decode a QR code and check its destination URL against VirusTotal, AbuseIPDB, Shodan, and URLHaus for known threats." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div id="header-placeholder"></div>
  <script src="js/header-loader.js"></script>
    <section class="project-cs-hero">
        <div class="project-cs-hero__content">
            <h1 class="heading-primary">Advanced QR-Code Analysis</h1>
            <div class="project-cs-hero__info">
                <p class="text-primary">
                    Dive deeper into your QR codes with advanced analytical tools!<br>
                </p>
            </div>
        </div>
    </section>
    <form id="qrForm" enctype="multipart/form-data" action="https://qr-code-analyzer.zdhenard42.workers.dev/decode-qr" method="POST">
        <input type="hidden" name="MAX_FILE_SIZE" value="1048576" />
    
        <div class="form-group">
            <label for="qrCodeImage">Upload QR Code Image:</label>
            <input name="file" type="file" id="qrCodeImage" accept=".png, .jpg, .jpeg" placeholder="Select QR Code Image" />
        </div>
    
        <div class="form-group">
            <input type="submit" value="Read QR code" class="submit-btn" />
        </div>
    </form>
    <div id="loading" class="spinner" style="display: none;"></div>
    <div id="output" class="result-container"  style="display: none;"></div>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById('qrForm');
    const outputDiv = document.getElementById('output');
    const loadingDiv = document.getElementById('loading');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const file = document.getElementById('qrCodeImage').files[0];
        if (!file) {
            outputDiv.innerHTML = errorBlock('Please choose a QR code image first.');
            outputDiv.style.display = 'block';
            return;
        }
        loadingDiv.style.display = 'block';
        outputDiv.style.display = 'none';
        // Use Fetch API to send the form data
        fetch(form.action, {
            method: form.method,
            body: new FormData(form)
        })
        .then(response => response.json().then(data => ({ ok: response.ok, data })))
        .then(({ ok, data }) => {
            outputDiv.innerHTML = ok ? formatData(data) : errorBlock(data.error || 'Something went wrong analyzing that QR code.');
            loadingDiv.style.display = 'none';
            outputDiv.style.display = 'block';
        })
        .catch(error => {
            console.error('Error:', error);
            outputDiv.innerHTML = errorBlock('Could not reach the analysis service. Please try again in a moment.');
            loadingDiv.style.display = 'none';
            outputDiv.style.display = 'block';
        });
    });
});

// Escapes text pulled from third-party APIs (WHOIS, domain names, etc.) before it goes into innerHTML
function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Only allow http(s) links — blocks javascript: or data: URIs that could come from a malicious QR code or API response
function safeHref(url) {
    if (typeof url !== 'string') return null;
    try {
        const parsed = new URL(url, window.location.href);
        return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : null;
    } catch {
        return null;
    }
}

// Renders a value as a link if a safe URL is supplied, otherwise as escaped plain text (with a fallback for missing data)
// Pass isHtml: true only for values built internally (never for raw API data) that intentionally contain markup
function field(label, value, linkUrl, isHtml) {
    const isEmpty = value === undefined || value === null || value === '';
    const display = isEmpty ? 'N/A' : (isHtml ? value : escapeHtml(value));
    const href = isEmpty ? null : safeHref(linkUrl);
    const valueHtml = href
        ? `<a href="${href}" target="_blank" rel="noopener noreferrer">${display}</a>`
        : display;
    return `<strong>${escapeHtml(label)}</strong>: ${valueHtml}<br>`;
}

function errorBlock(message) {
    return `<div class="error-message">${message}</div>`;
}

// Decides the overall risk banner from the combined signals returned by the worker
function riskBanner(data) {
    const malicious = data.virusTotalAnalysis?.malicious ?? 0;
    const suspicious = data.virusTotalAnalysis?.suspicious ?? 0;
    const abuseScore = data.abuseConfidenceScore ?? 0;

    if (malicious > 0 || data.URLHausListed || abuseScore >= 50) {
        return { level: 'risk-high', label: 'High Risk — known malicious indicators found' };
    }
    if (suspicious > 0 || abuseScore > 0) {
        return { level: 'risk-medium', label: 'Caution — some suspicious indicators found' };
    }
    return { level: 'risk-low', label: 'No known threats detected' };
}

// Helper function to format JSON data into a user-friendly string
function formatData(data) {
    const vt = data['virusTotalAnalysis'];
    const totalReports = vt ? vt.malicious + vt.suspicious + vt.harmless + vt.undetected : 0;
    const risk = riskBanner(data);

    return `
    <div class="risk-banner ${risk.level}">${risk.label}</div>
    <div class="result-columns">
        <div>
            ${field('QR Code Original URL', data['qrUrl'], data['qrUrl'])}
            ${field('Redirects to', data['finalHost'], data['finalHost'])}
            ${field('IP Address', data['HostIP'], data['shodanLink'])}
            ${field('Network', data['VirusTotalNetwork'])}
            ${field('VirusTotal Report', vt ? `<span style="${vt.malicious > 0 ? 'color: red;' : ''}">${vt.malicious}/${totalReports} malicious</span>` : null, data['virusTotalLink'], true)}
            ${field('AbuseIPDB total reports', `<span style="${data['abuseTotalReports'] > 0 ? 'color: red;' : ''}">${data['abuseTotalReports'] ?? 'N/A'}</span>`, data['abuseIPDBLink'], true)}
            ${field('AbuseIPDB confidence of abuse', data['abuseConfidenceScore'] !== undefined ? `${data['abuseConfidenceScore']}%` : undefined, data['abuseIPDBLink'])}
            ${field('URL Status', data['URLHausOffline'], data['URLHausReference'])}
            ${field('URLHaus Threat Identification', data['URLHausThreat'], data['URLHausReference'])}
            ${field('URLHaus Tags', data['URLHausTags']?.join(', '))}
        </div>
        <div>
            ${field('Domain', data['abuseDomain'])}
            ${field('ISP', data['abuseISP'])}
            ${field('Is a Tor Relay', data['abuseIsTor'])}
            ${field('Usage Type', data['abuseUsageType'])}
            ${field('ASN', data['shodanASN'], data['shodanLink'])}
            ${field('Country', data['shodanCountry'])}
            ${field('Operating Systems', data['shodanOS'])}
            ${field('Open port(s)', data['shodanPorts']?.join(', '))}
        </div>
    </div>
    ${data['virusTotalWhoIs'] ? `<strong>WhoIS:</strong>
    <div class="whois-data">
        ${escapeHtml(data['virusTotalWhoIs']).replace(/\n/g, '<br>')}
    </div>` : ''}
    `;
}
        </script>
        

    <footer class="main-footer">
        <div class="main-container">
          <div class="main-footer__upper">
            <div class="main-footer__row main-footer__row-1">
              <div class="cve-section">
                <h4 class="heading heading-sm text-lt">Latest Published CVE</h4>
                <p class="cve-subtitle">A recent CVE from the public vulnerability feed</p>
                <div id="cve-content" class="cve-content">
                  <p>Loading the latest published CVE...</p>
                </div>
              </div>
            </div>
            <div class="main-footer__row main-footer__row-2">
              <h4 class="heading heading-sm text-lt">Zachary Henard</h4>
            </div>
          </div>
        </div>
      </footer>
</body>
